  <script>
  // Typing Animation (Infinite Loop)
const text = "I am grade 11 - web design student";
let i = 0;
function typing() {
  const el = document.getElementById("wow");

  if (i < text.length) {
    el.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 100);
  } else {
    setTimeout(() => {
      el.innerHTML = "";
      i = 0;
      typing();
    }, 1500);
    
    setTimeout(() => {
      el.innerHTML = "";
      i = 0;
      typing();
    }, 1500);
  }
}

typing();
</script>
